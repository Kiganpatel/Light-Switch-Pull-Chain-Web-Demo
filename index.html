<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pull the Light</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#080604; }
canvas { display:block; position:fixed; top:0; left:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    const a=Array.isArray(r)?r:[r,r,r,r];
    const [tl,tr,br2,bl]=a.map(v=>Math.min(+v||0,Math.min(w,h)/2));
    this.moveTo(x+tl,y); this.lineTo(x+w-tr,y); this.quadraticCurveTo(x+w,y,x+w,y+tr);
    this.lineTo(x+w,y+h-br2); this.quadraticCurveTo(x+w,y+h,x+w-br2,y+h);
    this.lineTo(x+bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-bl);
    this.lineTo(x,y+tl); this.quadraticCurveTo(x,y,x+tl,y); this.closePath();
  };
}

const C = document.getElementById('c');
const X = C.getContext('2d');
let W=0, H=0;

let lightOn=false, brightness=0, flickerT=0, startFlicker=0;
let hintAlpha=1, interacted=false;
let frame=0;

// ── STORY STATE ───────────────────────────────────────────────────
let storyPhase='intro';
let introTimer=0;
const INTRO_HOLD=160;
const INTRO_FADE=80;
let storyLines=[
  {text:"it's late.",        startFrame:50,  endFrame:160, alpha:0},
  {text:"the cord is there.",startFrame:175, endFrame:290, alpha:0},
];
let shatterTimer=0;
const SHATTER_DARK=200;
let replacingProgress=0;
let moonAngle=0;

// ── PLOT ──────────────────────────────────────────────────────────
// A small story told through light. Each toggle reveals a line.
// The room belonged to someone. You're back.
let lightOnCount=0;
let plotTimer=0;        // counts up while light is on
let plotLine='';        // current line being shown
let plotAlpha=0;        // 0→1→0
let plotState='idle';   // 'idle' | 'fadein' | 'hold' | 'fadeout'
let lastPlotLine='';

// Lines shown on successive light-ons.
// After the last one, the shatter ending text triggers on next shatter.
const PLOT = [
  "",                                          // 1st on: just silence
  "you haven't been here in a while.",
  "her coat is still on the chair.",
  "the book is open to the last page she read.",
  "you keep meaning to return it.",
  "the bulb flickers the same way it always did.",
  "some rooms stay the same no matter how long you're gone.",
];
const PLOT_SHATTER_LINE = "maybe that's enough for tonight.";

function triggerPlotLine(text){
  if(!text) return;
  plotLine=text; plotAlpha=0; plotState='fadein'; plotTimer=0;
}

function stepPlot(){
  if(plotState==='idle') return;
  plotTimer++;
  if(plotState==='fadein'){
    plotAlpha=Math.min(1,plotTimer/45);
    if(plotAlpha>=1){plotState='hold'; plotTimer=0;}
  } else if(plotState==='hold'){
    if(plotTimer>140){plotState='fadeout'; plotTimer=0;}
  } else if(plotState==='fadeout'){
    plotAlpha=Math.max(0,1-plotTimer/50);
    if(plotAlpha<=0){plotState='idle'; plotLine='';}
  }
}

function drawPlotLine(){
  if(plotState==='idle'||!plotLine) return;
  X.save();
  X.globalAlpha=plotAlpha*0.88;
  X.textAlign='center';
  X.font='italic 17px Georgia,"Times New Roman",serif';
  // Subtle text shadow for legibility over both dark and lit backgrounds
  X.shadowColor='rgba(0,0,0,0.85)'; X.shadowBlur=18;
  X.fillStyle='rgba(210,190,155,1)';
  X.fillText(plotLine, W/2, H*0.78);
  X.restore();
}

// ── PULL ROPE ────────────────────────────────────────────────────
const NSEG=20;
let ropeAnchorX=0, nodes=[], segLen=0;

function initRope() {
  ropeAnchorX=W*0.14;
  const restLen=H*0.46; segLen=restLen/NSEG; nodes=[];
  for(let i=0;i<=NSEG;i++)
    nodes.push({x:ropeAnchorX,y:i*segLen,px:ropeAnchorX,py:i*segLen-0.001,pinned:i===0});
}
function stepRope() {
  const GRAV=0.65,DAMP=0.93;
  for(const n of nodes){
    if(n.pinned)continue;
    let vx=(n.x-n.px)*DAMP,vy=(n.y-n.py)*DAMP;
    const spd=Math.hypot(vx,vy); if(spd>18){vx=vx/spd*18;vy=vy/spd*18;}
    n.px=n.x;n.py=n.y;n.x+=vx;n.y+=vy+GRAV;
  }
  for(let it=0;it<50;it++){
    nodes[0].x=ropeAnchorX;nodes[0].y=0;
    for(let i=0;i<nodes.length-1;i++){
      const a=nodes[i],b=nodes[i+1];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1e-9,c=(d-segLen)/d*0.5;
      if(!a.pinned){a.x+=dx*c;a.y+=dy*c;}
      if(!b.pinned){b.x-=dx*c;b.y-=dy*c;}
    }
  }
}

// ── BULB ─────────────────────────────────────────────────────────
let pendAnchorX=0, wireLen=0;
let bulb={x:0,y:0,px:0,py:0};
function initBulb(){
  pendAnchorX=W*0.54; wireLen=H*0.40;
  bulb.x=pendAnchorX; bulb.y=8+wireLen;
  bulb.px=pendAnchorX; bulb.py=8+wireLen-0.001;
}
function stepBulb(){
  if(dragTarget==='bulb')return;
  if(bulbShattered)return;
  const DAMP=0.9978,GRAV=0.30;
  let vx=(bulb.x-bulb.px)*DAMP,vy=(bulb.y-bulb.py)*DAMP;
  bulb.px=bulb.x;bulb.py=bulb.y;
  bulb.x+=vx;bulb.y+=vy+GRAV;
  const dx=bulb.x-pendAnchorX,dy=bulb.y-8,d=Math.hypot(dx,dy)||1e-9,s=wireLen/d;
  bulb.x=pendAnchorX+dx*s;bulb.y=8+dy*s;
  // Shatter if swinging too fast
  const spd=Math.hypot(vx,vy);
  if(spd>SHATTER_SPEED) shatterBulb();
}
function wireAngle(){return Math.atan2(bulb.x-pendAnchorX,bulb.y-8);}
// Light source point (center of glass globe in world space)
function lightPos(){
  const wa=wireAngle();
  const lx=bulb.x+Math.sin(-wa)*38;
  const ly=bulb.y+Math.cos(-wa)*38;
  return {x:lx,y:ly};
}

// ── DUST MOTES ───────────────────────────────────────────────────
const DUST_COUNT=220;
let dustParticles=[];
function initDust(){
  dustParticles=[];
  for(let i=0;i<DUST_COUNT;i++){
    dustParticles.push({
      x:Math.random()*W,
      y:Math.random()*H,
      vx:(Math.random()-0.5)*0.18,
      vy:(Math.random()-0.5)*0.12-0.04,
      size:Math.random()*1.8+0.4,
      alpha:Math.random(),
      drift:Math.random()*Math.PI*2,
      driftSpd:0.008+Math.random()*0.012,
    });
  }
}
function stepDust(){
  for(const p of dustParticles){
    p.drift+=p.driftSpd;
    p.x+=p.vx+Math.sin(p.drift)*0.15;
    p.y+=p.vy+Math.cos(p.drift*0.7)*0.08;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
  }
}

// Point-in-cone test: is world point (px,py) inside the light cone?
// Cone tip at lightPos, direction = wire direction downward, half-angle ~28 deg
function inCone(px,py,lx,ly,coneAngle){
  const wa=wireAngle();
  // Cone axis direction in world space: pointing "down" from the bulb tip
  const axX=Math.sin(-wa),axY=Math.cos(-wa);
  // wait — cone points away from wire (downward from the globe tip)
  const dx=px-lx,dy=py-ly;
  const d=Math.hypot(dx,dy);
  if(d<1)return true;
  const dot=(dx*axX+dy*axY)/d;// cos of angle between ray and axis
  return dot>Math.cos(coneAngle);
}

function drawDust(){
  if(brightness<0.01)return;
  let fl=startFlicker>0?(Math.random()>0.35?1:0.06):0.93+Math.sin(flickerT*18.3)*0.035;
  const br=brightness*fl;
  const {x:lx,y:ly}=lightPos();
  const HALF_ANGLE=0.52; // ~30 degrees

  X.save();
  for(const p of dustParticles){
    if(!inCone(p.x,p.y,lx,ly,HALF_ANGLE))continue;
    // Fade by distance from axis
    const wa=wireAngle();
    const axX=Math.sin(-wa),axY=Math.cos(-wa);
    const dx=p.x-lx,dy=p.y-ly;
    const d=Math.hypot(dx,dy)||1;
    const dot=(dx*axX+dy*axY)/d;
    const distFade=Math.max(0,1-d/(H*0.72));
    const angleFade=Math.max(0,(dot-Math.cos(HALF_ANGLE))/(1-Math.cos(HALF_ANGLE)));
    const a=p.alpha*distFade*angleFade*br*0.85;
    if(a<0.01)continue;
    X.globalAlpha=a;
    X.fillStyle='rgba(255,228,140,1)';
    X.beginPath();
    X.arc(p.x,p.y,p.size,0,Math.PI*2);
    X.fill();
    // Tiny glow around each mote
    if(a>0.15){
      const g=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);
      g.addColorStop(0,`rgba(255,210,100,${a*0.5})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=g;
      X.beginPath();
      X.arc(p.x,p.y,p.size*4,0,Math.PI*2);
      X.fill();
    }
  }
  X.globalAlpha=1;
  X.restore();
}

// ── MOTHS ────────────────────────────────────────────────────────
let moths=[];
function initMoths(){
  moths=[];
  for(let i=0;i<4;i++){
    moths.push({
      x:Math.random()*W,
      y:H*0.3+Math.random()*H*0.5,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      angle:Math.random()*Math.PI*2,
      wingPhase:Math.random()*Math.PI*2,
      orbitAngle:Math.random()*Math.PI*2,
      orbitRadius:30+Math.random()*80,
      orbitSpd:(0.025+Math.random()*0.03)*(Math.random()<0.5?1:-1),
      attracted:false,
      attractTimer:0,
    });
  }
}
function stepMoths(){
  const {x:lx,y:ly}=lightPos();
  for(const m of moths){
    m.wingPhase+=0.28;
    if(!lightOn){
      // Wander randomly when light off
      m.attracted=false;
      m.vx+=(Math.random()-0.5)*0.18;
      m.vy+=(Math.random()-0.5)*0.18;
      m.vx*=0.95;m.vy*=0.95;
      m.x+=m.vx;m.y+=m.vy;
    } else {
      // When light on, orbit around the bulb with jitter
      m.orbitAngle+=m.orbitSpd;
      m.orbitRadius=Math.max(28,m.orbitRadius+(Math.random()-0.5)*1.2);
      const tx=lx+Math.cos(m.orbitAngle)*m.orbitRadius;
      const ty=ly+Math.sin(m.orbitAngle)*m.orbitRadius*0.6;
      m.vx+=(tx-m.x)*0.04;
      m.vy+=(ty-m.y)*0.04;
      m.vx*=0.88;m.vy*=0.88;
      m.vx+=(Math.random()-0.5)*0.9;
      m.vy+=(Math.random()-0.5)*0.9;
      m.x+=m.vx;m.y+=m.vy;
    }
    m.angle=Math.atan2(m.vy,m.vx);
    // Keep on screen loosely
    m.x=Math.max(10,Math.min(W-10,m.x));
    m.y=Math.max(70,Math.min(H*0.88,m.y));
  }
}
function drawMoths(){
  const visible=brightness>0.05;
  for(const m of moths){
    if(!visible&&!lightOn)continue;
    const alpha=(lightOn?0.70:0.25)*Math.min(1,brightness*3+0.1);
    if(alpha<0.05)continue;
    X.save();
    X.translate(m.x,m.y);
    X.rotate(m.angle+Math.PI/2);
    X.globalAlpha=alpha;
    // Wings
    const wFlap=Math.sin(m.wingPhase)*0.45;
    for(const side of[-1,1]){
      X.save();
      X.scale(side,1);
      X.rotate(wFlap*side);
      // Forewing
      X.fillStyle='rgba(140,115,72,0.82)';
      X.beginPath();
      X.ellipse(4,0,9,5,0.3,0,Math.PI*2);
      X.fill();
      // Hindwing
      X.fillStyle='rgba(110,88,52,0.65)';
      X.beginPath();
      X.ellipse(3,4,6,3.5,-0.2,0,Math.PI*2);
      X.fill();
      // Wing vein
      X.strokeStyle='rgba(80,58,28,0.4)';
      X.lineWidth=0.5;
      X.beginPath();
      X.moveTo(0,0);X.lineTo(10,0);
      X.stroke();
      X.restore();
    }
    // Body
    X.fillStyle='rgba(80,60,30,0.9)';
    X.beginPath();X.ellipse(0,0,2.5,6,0,0,Math.PI*2);X.fill();
    // Antennae
    X.strokeStyle='rgba(100,80,45,0.7)';X.lineWidth=0.8;
    for(const side of[-1,1]){
      X.beginPath();X.moveTo(side*1.5,-6);X.quadraticCurveTo(side*8,-14,side*10,-12);X.stroke();
    }
    X.globalAlpha=1;
    X.restore();
  }
}

// ── ROOM OBJECTS ─────────────────────────────────────────────────
let chair=null, sideTable=null;
function initObjects(){
  const fY=H*0.883;
  const cx=W*0.73;
  const sW=Math.min(W*0.096,102);
  const legH=Math.min(H*0.205,178);
  const backH=Math.min(H*0.175,150);
  const lW=8;
  const seatY=fY-legH;
  chair={cx,fY,sW,legH,backH,lW,seatY,
    shadowVerts:[
      {x:cx-sW/2+lW, y:seatY-backH+8},
      {x:cx+sW/2-lW, y:seatY-backH+8},
      {x:cx+sW/2,    y:seatY},
      {x:cx+sW/2,    y:fY},
      {x:cx-sW/2,    y:fY},
      {x:cx-sW/2,    y:seatY},
    ]};
  const tx=W*0.20;
  const tH=Math.min(H*0.155,136);
  const tW=Math.min(W*0.075,78);
  const plW=15;
  sideTable={tx,fY,tH,tW,plW,topY:fY-tH,
    shadowVerts:[
      {x:tx-tW/2,y:fY-tH},
      {x:tx+tW/2,y:fY-tH},
      {x:tx+plW/2,y:fY},
      {x:tx-plW/2,y:fY},
    ]};
}

function projectFloorX(lx,ly,vx,vy,fY){
  const denom=vy-ly; if(denom<1)return null;
  const t=(fY-ly)/denom; if(t<0)return null;
  return lx+t*(vx-lx);
}
function getShadowRange(lx,ly,verts){
  const fY=H*0.883;
  let minX=Infinity,maxX=-Infinity;
  for(const v of verts){
    if(Math.abs(v.y-fY)<4){minX=Math.min(minX,v.x);maxX=Math.max(maxX,v.x);}
    const px=projectFloorX(lx,ly,v.x,v.y,fY);
    if(px!==null){minX=Math.min(minX,px);maxX=Math.max(maxX,px);}
  }
  return{minX,maxX};
}
function drawFloorShadow(lx,ly,verts,br){
  const{minX,maxX}=getShadowRange(lx,ly,verts);
  if(!isFinite(minX)||maxX-minX<2)return;
  const fY=H*0.883;
  const w=maxX-minX;
  const pad=Math.min(22,w*0.14);
  X.save();
  const cg=X.createLinearGradient(minX-pad,0,maxX+pad,0);
  cg.addColorStop(0,'rgba(0,0,0,0)');
  cg.addColorStop(pad/(w+pad*2),`rgba(0,0,0,${0.60*br})`);
  cg.addColorStop(1-pad/(w+pad*2),`rgba(0,0,0,${0.60*br})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=cg;X.fillRect(minX-pad,fY-5,w+pad*2,11);
  const sP=Math.min(55,w*0.55);
  const sg=X.createLinearGradient(minX-sP,0,maxX+sP,0);
  sg.addColorStop(0,'rgba(0,0,0,0)');
  sg.addColorStop(sP/(w+sP*2),`rgba(0,0,0,${0.20*br})`);
  sg.addColorStop(1-sP/(w+sP*2),'rgba(0,0,0,0)');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=sg;X.fillRect(minX-sP,fY-4,w+sP*2,9);
  X.restore();
}

// Wall shadow — projects silhouette onto the back wall (y=60..H*0.88 strip, behind objects)
function drawWallShadow(lx,ly,verts,br){
  if(br<0.02)return;
  const wallX=W; // back wall is at high X for chair side
  // For each pair of vertices, project onto wall strips
  // Simplified: find top-most and bottom-most shadow extent on right wall
  // Only do this for the chair (left wall for table)
  X.save();
  let minY=Infinity,maxY=-Infinity;
  for(const v of verts){
    // project onto right wall x=W*0.92
    const wX=W*0.91;
    const denom=v.x-lx;
    if(Math.abs(denom)<1)continue;
    const t=(wX-lx)/denom;
    if(t<0||t>8)continue;
    const projY=ly+t*(v.y-ly);
    if(projY>60&&projY<H*0.88){minY=Math.min(minY,projY);maxY=Math.max(maxY,projY);}
  }
  if(isFinite(minY)&&maxY-minY>5){
    const h=maxY-minY;
    const pad=Math.min(18,h*0.15);
    const wg=X.createLinearGradient(0,minY-pad,0,maxY+pad);
    wg.addColorStop(0,'rgba(0,0,0,0)');
    wg.addColorStop(pad/(h+pad*2),`rgba(0,0,0,${0.38*br})`);
    wg.addColorStop(1-pad/(h+pad*2),`rgba(0,0,0,${0.38*br})`);
    wg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=wg;X.fillRect(W*0.84,minY-pad,W*0.16,h+pad*2);
  }
  // Left wall for table
  let minY2=Infinity,maxY2=-Infinity;
  const tableVerts=sideTable?sideTable.shadowVerts:[];
  for(const v of tableVerts){
    const wX=W*0.08;
    const denom=v.x-lx;
    if(Math.abs(denom)<1)continue;
    const t=(wX-lx)/denom;
    if(t<0||t>10)continue;
    const projY=ly+t*(v.y-ly);
    if(projY>60&&projY<H*0.88){minY2=Math.min(minY2,projY);maxY2=Math.max(maxY2,projY);}
  }
  if(isFinite(minY2)&&maxY2-minY2>5){
    const h=maxY2-minY2;
    const pad=Math.min(18,h*0.15);
    const wg=X.createLinearGradient(0,minY2-pad,0,maxY2+pad);
    wg.addColorStop(0,'rgba(0,0,0,0)');
    wg.addColorStop(pad/(h+pad*2),`rgba(0,0,0,${0.32*br})`);
    wg.addColorStop(1-pad/(h+pad*2),`rgba(0,0,0,${0.32*br})`);
    wg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=wg;X.fillRect(0,minY2-pad,W*0.16,h+pad*2);
  }
  X.restore();
}

function drawObjects(){
  if(!chair||!sideTable)return;
  const{cx,fY,sW,legH,backH,lW,seatY}=chair;
  const{tx,tH,tW,plW,topY}=sideTable;
  // AO chair
  const aoG=X.createLinearGradient(cx-sW/2,fY-6,cx+sW/2,fY);
  aoG.addColorStop(0,'rgba(0,0,0,0)');aoG.addColorStop(0.3,'rgba(0,0,0,0.35)');
  aoG.addColorStop(0.7,'rgba(0,0,0,0.35)');aoG.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=aoG;X.fillRect(cx-sW/2,fY-6,sW,8);
  // Back legs
  X.fillStyle='#1c1008';
  X.fillRect(cx-sW/2+lW+4,seatY-backH,lW,legH+backH);
  X.fillRect(cx+sW/2-lW*2-4,seatY-backH,lW,legH+backH);
  // Front legs
  X.fillStyle='#28180a';
  X.fillRect(cx-sW/2+2,seatY,lW,legH);X.fillRect(cx+sW/2-lW-2,seatY,lW,legH);
  // Back slats
  for(let i=0;i<3;i++){
    const sy=seatY-backH*0.18-i*backH*0.23;
    X.fillStyle=`rgba(52,30,12,${0.9-i*0.1})`;
    X.fillRect(cx-sW/2+lW*2+2,sy,sW-lW*4-4,7);
  }
  // Top back rail
  const bG=X.createLinearGradient(cx-sW/2+lW,seatY-backH,cx+sW/2-lW,seatY-backH+12);
  bG.addColorStop(0,'#4a2c12');bG.addColorStop(1,'#2e1a08');
  X.fillStyle=bG;X.fillRect(cx-sW/2+lW,seatY-backH,sW-lW*2,12);
  // Seat
  const seatG=X.createLinearGradient(cx,seatY-14,cx,seatY+2);
  seatG.addColorStop(0,'#5e3818');seatG.addColorStop(1,'#3a2008');
  X.fillStyle=seatG;X.fillRect(cx-sW/2,seatY-14,sW,16);
  if(brightness>0.04){
    X.fillStyle=`rgba(255,188,68,${brightness*0.10})`;X.fillRect(cx-sW/2,seatY-14,sW,3);
    X.fillStyle=`rgba(255,180,60,${brightness*0.06})`;X.fillRect(cx-sW/2+lW,seatY-backH,sW-lW*2,3);
  }
  // AO table
  const aoG2=X.createLinearGradient(tx-tW/2,fY-5,tx+tW/2,fY);

// ── AUDIO ─────────────────────────────────────────────────────────
let audioCtx=null, humNode=null, humGain=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function soundClick(){
  const ctx=getAudio();
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*120)*0.9;}
  const src=ctx.createBufferSource(); src.buffer=buf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
  const g=ctx.createGain(); g.gain.value=0.6;
  src.connect(hp); hp.connect(g); g.connect(ctx.destination); src.start();
}
function soundBulbOn(){
  const ctx=getAudio();
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.22,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*18)*0.7;}
  const src=ctx.createBufferSource(); src.buffer=buf;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=3200;
  const g=ctx.createGain(); g.gain.value=0.45;
  src.connect(lp); lp.connect(g); g.connect(ctx.destination); src.start();
  startHum();
}
function soundBulbOff(){
  const ctx=getAudio();
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.08,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*60)*0.5;}
  const src=ctx.createBufferSource(); src.buffer=buf;
  const g=ctx.createGain(); g.gain.value=0.4;
  src.connect(g); g.connect(ctx.destination); src.start();
  stopHum();
}
function startHum(){
  const ctx=getAudio(); if(humNode) return;
  humGain=ctx.createGain(); humGain.gain.setValueAtTime(0,ctx.currentTime);
  humGain.gain.linearRampToValueAtTime(0.04,ctx.currentTime+0.4);
  humGain.connect(ctx.destination);
  humNode=ctx.createOscillator(); humNode.type='sawtooth'; humNode.frequency.value=120;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
  humNode.connect(lp); lp.connect(humGain); humNode.start();
}
function stopHum(){
  if(!humNode||!humGain) return;
  const ctx=getAudio();
  humGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.35);
  const h=humNode; setTimeout(()=>{try{h.stop();}catch(e){}},400);
  humNode=null; humGain=null;
}
function soundRopeSwish(speed){
  if(speed<2.5) return;
  const ctx=getAudio();
  const dur=Math.min(0.12+speed*0.008,0.28);
  const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=(Math.random()*2-1)*Math.pow(1-t/dur,1.5)*0.5;}
  const src=ctx.createBufferSource(); src.buffer=buf;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800+speed*60; bp.Q.value=0.8;
  const g=ctx.createGain(); g.gain.value=Math.min(0.18,speed*0.014);
  src.connect(bp); bp.connect(g); g.connect(ctx.destination); src.start();
}
let lastSwishFrame=0;

// ── BULB SHATTER ─────────────────────────────────────────────────
let bulbShattered=false;
let shards=[];
let shatterFlash=0;
const SHATTER_SPEED=18; // px/frame velocity threshold

function shatterBulb(){
  if(bulbShattered)return;
  bulbShattered=true; lightOn=false; stopHum(); shatterFlash=8;
  storyPhase='shattered'; shatterTimer=0;
  shards=[];
  const wa=wireAngle();
  const gCx=bulb.x+Math.sin(-wa)*38, gCy=bulb.y+Math.cos(-wa)*38;
  for(let i=0;i<22;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=3+Math.random()*9;
    shards.push({
      x:gCx,y:gCy,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*0.35,
      size:4+Math.random()*10,
      alpha:1,life:1,
    });
  }
  // Moths scatter
  for(const m of moths){m.vx=(Math.random()-0.5)*12;m.vy=-4-Math.random()*6;}
  // If the story has progressed enough, show the closing line in darkness
  if(lightOnCount>=3) setTimeout(()=>triggerPlotLine(PLOT_SHATTER_LINE), 1200);
  soundShatter();
}

function stepShards(){
  for(const s of shards){
    s.vy+=0.38; // gravity
    s.vx*=0.985; s.vy*=0.985;
    s.x+=s.vx; s.y+=s.vy;
    s.rot+=s.rotV;
    s.life-=0.012;
    s.alpha=Math.max(0,s.life);
    if(s.y>H*0.88){s.y=H*0.88;s.vy*=-0.3;s.vx*=0.7;}
  }
}

function drawShards(){
  if(!bulbShattered)return;
  if(shatterFlash>0){
    X.save();X.globalAlpha=shatterFlash/8*0.7;
    X.fillStyle='rgba(255,240,180,1)';X.fillRect(0,0,W,H);
    X.restore(); shatterFlash--;
  }
  X.save();
  for(const s of shards){
    if(s.alpha<0.01)continue;
    X.save();X.translate(s.x,s.y);X.rotate(s.rot);X.globalAlpha=s.alpha*0.85;
    X.strokeStyle=`rgba(180,220,240,${s.alpha})`;X.lineWidth=1;
    X.fillStyle=`rgba(200,235,255,${s.alpha*0.3})`;
    X.beginPath();
    // Irregular shard shape
    const n=3+Math.floor(Math.random()*2+0.5);
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2,r=s.size*(0.5+Math.random()*0.5);
      i===0?X.moveTo(Math.cos(a)*r,Math.sin(a)*r):X.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    X.closePath();X.fill();X.stroke();
    X.restore();
  }
  X.restore();
  // replace prompt removed — handled by story overlay
}

function soundShatter(){
  const ctx=getAudio();
  // Burst of high noise + low thud
  const dur=0.35;
  const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/ctx.sampleRate;
    d[i]=(Math.random()*2-1)*(Math.exp(-t*22)*0.9+Math.exp(-t*4)*0.3);
  }
  const src=ctx.createBufferSource();src.buffer=buf;
  const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1200;
  const g=ctx.createGain();g.gain.value=0.8;
  src.connect(hp);hp.connect(g);g.connect(ctx.destination);src.start();
  // Low thud
  const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(120,ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(40,ctx.currentTime+0.12);
  const gOsc=ctx.createGain();gOsc.gain.setValueAtTime(0.5,ctx.currentTime);
  gOsc.gain.linearRampToValueAtTime(0,ctx.currentTime+0.18);
  osc.connect(gOsc);gOsc.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.2);
}

// ── INPUT ─────────────────────────────────────────────────────────
let mx=0,my=0,pmx=0,pmy=0,dragTarget=null,ropePullY0=0,ropePullX0=0,maxRopePull=0;
function hitTarget(cx,cy){
  const t=nodes[nodes.length-1];
  if(Math.hypot(t.x-cx,t.y-cy)<44)return 'rope';
  if(!bulbShattered&&Math.hypot(bulb.x-cx,bulb.y-cy)<68)return 'bulb';
  return null;
}
function pointerDown(cx,cy){
  pmx=mx=cx;pmy=my=cy;
  if(storyPhase==='intro'&&introTimer<INTRO_HOLD)return;
  if(storyPhase==='shattered'&&shatterTimer<SHATTER_DARK)return;
  if(storyPhase==='replacing')return;
  // Replace shattered bulb on any click (handled by phase transition now)
  if(bulbShattered)return;
  const t=hitTarget(cx,cy);if(!t)return;
  dragTarget=t;interacted=true;C.style.cursor='grabbing';
  if(t==='rope'){
    const n=nodes[nodes.length-1];
    ropePullX0=n.x;ropePullY0=n.y;maxRopePull=0;
  }
}
function pointerMove(cx,cy){
  pmx=mx;pmy=my;mx=cx;my=cy;
  if(dragTarget==='rope'){
    const n=nodes[nodes.length-1];
    n.px=n.x-(cx-pmx)*0.55;n.py=n.y-(cy-pmy)*0.55;
    n.x=cx;n.y=cy;
    // any direction pull — total displacement from start
    maxRopePull=Math.max(maxRopePull,Math.hypot(cx-ropePullX0,cy-ropePullY0));
  }
  if(dragTarget==='bulb'){
    const dx=cx-pendAnchorX,dy=cy-8,d=Math.hypot(dx,dy)||1e-9,s=wireLen/d;
    const nx=pendAnchorX+dx*s,ny=8+dy*s;
    bulb.px=bulb.x-(nx-bulb.x)*0.4;bulb.py=bulb.y-(ny-bulb.y)*0.4;
    bulb.x=nx;bulb.y=ny;
  }
  if(!dragTarget)C.style.cursor=hitTarget(cx,cy)?'grab':'default';
}
function pointerUp(){
  if(dragTarget==='rope'&&maxRopePull>82){
    soundClick();
    lightOn=!lightOn;
    if(lightOn){
      startFlicker=55;
      setTimeout(soundBulbOn,35);
      lightOnCount++;
      const line = PLOT[Math.min(lightOnCount, PLOT.length-1)];
      if(line) setTimeout(()=>triggerPlotLine(line), 900);
    } else {
      soundBulbOff();
    }
  }
  dragTarget=null;C.style.cursor=hitTarget(mx,my)?'grab':'default';
}
C.addEventListener('mousedown',e=>pointerDown(e.clientX,e.clientY));
C.addEventListener('mousemove',e=>pointerMove(e.clientX,e.clientY));
C.addEventListener('mouseup',()=>pointerUp());
C.addEventListener('mouseleave',()=>pointerUp());
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];pointerDown(t.clientX,t.clientY);},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];pointerMove(t.clientX,t.clientY);},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();pointerUp();},{passive:false});

// ── DRAW ROOM ─────────────────────────────────────────────────────
function drawRoom(){
  X.fillStyle='#0b0906';X.fillRect(0,0,W,H);
  // Wall wood grain
  for(let i=0;i<W;i+=52){
    const wobX=Math.sin(i*0.018)*8;
    X.strokeStyle='rgba(88,50,14,0.055)';X.lineWidth=26;
    X.beginPath();X.moveTo(i+wobX,62);X.lineTo(i+wobX+16,H);X.stroke();
  }
  for(let i=0;i<W;i+=11){
    X.strokeStyle='rgba(52,28,6,0.04)';X.lineWidth=1;
    X.beginPath();X.moveTo(i,62);X.lineTo(i+4,H);X.stroke();
  }
  // ── FLOORBOARDS ────────────────────────────────────────────────
  const floorTop=H*0.883;
  const boardH=H*0.117;
  // Base floor color
  X.fillStyle='#100d09';X.fillRect(0,floorTop,W,boardH);
  // Draw individual planks
  const plankW=Math.min(W/9,90);
  const plankH=Math.min(boardH*0.38,22);
  for(let row=0;row<3;row++){
    const pY=floorTop+row*plankH;
    const offset=row%2===0?0:plankW*0.5;
    for(let col=-1;col<W/plankW+2;col++){
      const pX=col*plankW-offset;
      // Plank face: perspective foreshortening — planks narrower near top
      const perspScale=0.6+0.4*(row/3);
      const pH=plankH*perspScale;
      const pTop=pY+(plankH-pH);
      // Wood grain on plank
      const shade=Math.sin(col*2.3+row*1.7)*0.03;
      X.fillStyle=`rgb(${Math.round(26+shade*60)},${Math.round(18+shade*40)},${Math.round(8+shade*20)})`;
      X.fillRect(pX,pTop,plankW-2,pH);
      // Plank edge highlight (top)
      X.fillStyle='rgba(80,55,20,0.18)';
      X.fillRect(pX,pTop,plankW-2,1);
      // Gap between planks
      X.fillStyle='rgba(0,0,0,0.55)';
      X.fillRect(pX-1,pTop,2,pH);
      // Subtle grain lines
      X.strokeStyle=`rgba(8,5,2,0.12)`;X.lineWidth=1;
      for(let g=1;g<4;g++){
        X.beginPath();
        X.moveTo(pX+g*(plankW/4),pTop);
        X.lineTo(pX+g*(plankW/4)+2,pTop+pH);
        X.stroke();
      }
      // Light reflection on floor planks (when bulb on)
      if(brightness>0.02){
        const{x:lx,y:ly}=lightPos();
        const distToPlank=Math.hypot(pX+plankW/2-lx,pTop+pH/2-ly);
        const refl=Math.max(0,1-distToPlank/(H*0.55))*brightness*0.14;
        if(refl>0.005){
          X.fillStyle=`rgba(255,185,60,${refl})`;
          X.fillRect(pX,pTop,plankW-2,pH);
        }
      }
    }
  }
  // Baseboard
  X.fillStyle='#1c1710';X.fillRect(0,floorTop,W,3);
  // Vignette
  const vig=X.createRadialGradient(W/2,H*0.45,H*0.08,W/2,H*0.45,H*0.95);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.88)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);
  X.fillStyle='rgba(0,0,0,0.20)';
  X.fillRect(0,0,W*0.16,H);X.fillRect(W*0.84,0,W*0.16,H);
}

function drawRope(){

function drawBulb(){

  const br=brightness*fl;
  const wa=wireAngle();
  X.save();X.translate(bulb.x,bulb.y);X.rotate(-wa);
  if(br>0.005){
    const sH=24,gY0=sH+10,gH=78;

    const cg=X.createLinearGradient(0,coneStart,0,coneStart+coneLen);
    cg.addColorStop(0.00,`rgba(255,210,80,${0.32*br})`);
    cg.addColorStop(0.35,`rgba(210,128,28,${0.14*br})`);
    cg.addColorStop(0.80,`rgba(155,72,8,${0.05*br})`);
    cg.addColorStop(1.00,'rgba(0,0,0,0)');
    X.fillStyle=cg;X.beginPath();
    X.moveTo(-5,coneStart);X.lineTo(-coneBase/2,coneStart+coneLen);
    X.lineTo(coneBase/2,coneStart+coneLen);X.lineTo(5,coneStart);X.closePath();X.fill();
  }
  const sW=20,sH=24;
  X.save();X.shadowColor='rgba(0,0,0,0.58)';X.shadowBlur=10;X.shadowOffsetY=3;
  const sg=X.createLinearGradient(-sW/2,0,sW/2,sH);
  sg.addColorStop(0,'#504d62');sg.addColorStop(0.5,'#5e5b72');sg.addColorStop(1,'#2e2b3e');
  X.fillStyle=sg;X.beginPath();X.roundRect(-sW/2,0,sW,sH,[2,2,4,4]);X.fill();
  X.restore();
  X.strokeStyle='rgba(0,0,0,0.42)';X.lineWidth=1;
  for(let iy=5;iy<sH-2;iy+=4){X.beginPath();X.moveTo(-sW/2+1,iy);X.lineTo(sW/2-1,iy);X.stroke();}
  X.fillStyle='rgba(255,255,255,0.07)';X.fillRect(-sW/2+1,1,4,sH-2);
  X.fillStyle='#1c1a2a';
  X.beginPath();X.moveTo(-sW/2,sH);X.lineTo(-sW/2-4,sH+10);X.lineTo(sW/2+4,sH+10);X.lineTo(sW/2,sH);X.closePath();X.fill();
  const gY0=sH+10,gH=78,gW=56;
  if(br>0.02){X.shadowColor=`rgba(255,170,50,${br*0.88})`;X.shadowBlur=58*br;}
  X.beginPath();
  X.moveTo(-8,gY0);
  X.bezierCurveTo(-gW/2,gY0+10,-gW/2,gY0+38,-gW/2+10,gY0+60);
  X.bezierCurveTo(-14,gY0+gH,14,gY0+gH,gW/2-10,gY0+60);
  X.bezierCurveTo(gW/2,gY0+38,gW/2,gY0+10,8,gY0);
  X.closePath();
  const gg=X.createRadialGradient(-10,gY0+18,4,0,gY0+38,gW*0.75);
  if(br>0.02){
    gg.addColorStop(0.00,`rgba(255,252,215,${Math.min(1,br*1.05)})`);
    gg.addColorStop(0.25,`rgba(255,215,88,${0.98*br})`);
    gg.addColorStop(0.60,`rgba(255,152,28,${0.85*br})`);
    gg.addColorStop(1.00,`rgba(195,75,5,${0.55*br})`);
  }else{gg.addColorStop(0,'rgba(48,44,64,0.95)');gg.addColorStop(1,'rgba(22,20,34,0.98)');}
  X.fillStyle=gg;X.fill();X.shadowBlur=0;
  X.strokeStyle=br>0.4?`rgba(255,222,108,${0.55*br})`:'rgba(56,52,78,0.9)';
  X.lineWidth=1.5;X.stroke();
  if(br>0.02){X.shadowColor=`rgba(255,225,78,${br*0.92})`;X.shadowBlur=15*br;}
  const fg2=Math.round(148+107*br),fb2=Math.round(12+68*br);
  X.strokeStyle=br>0.02?`rgba(255,${fg2},${fb2},${Math.min(1,br*1.2)})`:'rgba(72,60,46,0.8)';
  X.lineWidth=1;X.lineCap='round';
  const fY2=gY0+14,fM=gY0+44;
  X.beginPath();X.moveTo(0,fY2);X.lineTo(-14,fM);X.stroke();
  X.beginPath();X.moveTo(0,fY2);X.lineTo(14,fM);X.stroke();
  X.lineWidth=2;X.beginPath();X.moveTo(-14,fM);
  for(let s=0;s<=9;s++)X.lineTo(-14+s*3.1,fM+(s%2===0?0:-11));
  X.stroke();X.shadowBlur=0;
  X.fillStyle=`rgba(255,255,255,${br>0.5?0.20:0.07})`;
  X.beginPath();X.ellipse(-16,gY0+24,5,13,-0.35,0,Math.PI*2);X.fill();
  X.fillStyle=`rgba(255,255,255,${br>0.5?0.13:0.04})`;
  X.beginPath();X.arc(-13,gY0+10,3.5,0,Math.PI*2);X.fill();
  if(br>0.3){X.fillStyle=`rgba(255,238,175,${0.32*br})`;X.beginPath();X.arc(0,gY0+gH-5,5,0,Math.PI*2);X.fill();}
  X.restore();
}

function drawMoonlight(){
  // Soft blue-white window light from right wall — always present, dims when bulb is bright
  const moonBr=Math.max(0.05, 0.55-brightness*0.5);
  const wx=W*0.88, wy=H*0.18;
  const wW=W*0.07, wH=H*0.22;

  X.save();
  // Window frame
  X.strokeStyle=`rgba(120,130,145,${moonBr*0.7})`;
  X.lineWidth=3;
  X.strokeRect(wx,wy,wW,wH);
  // Cross divider
  X.beginPath();X.moveTo(wx+wW/2,wy);X.lineTo(wx+wW/2,wy+wH);X.stroke();
  X.beginPath();X.moveTo(wx,wy+wH/2);X.lineTo(wx+wW,wy+wH/2);X.stroke();
  // Inner moonlight glow
  const wg=X.createRadialGradient(wx+wW/2,wy+wH/2,0,wx+wW/2,wy+wH/2,wW*1.8);
  wg.addColorStop(0,`rgba(180,200,230,${moonBr*0.22})`);
  wg.addColorStop(0.4,`rgba(140,165,200,${moonBr*0.10})`);
  wg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=wg;X.fillRect(wx-wW,wy-wH*0.5,wW*4,wH*3);
  // Moonbeam cast on floor (very subtle)
  const mbG=X.createLinearGradient(wx,wy+wH,wx+wW*0.5,H*0.885);
  mbG.addColorStop(0,`rgba(160,185,215,${moonBr*0.08})`);
  mbG.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=mbG;
  X.beginPath();X.moveTo(wx,wy+wH);X.lineTo(wx+wW,wy+wH);X.lineTo(wx+wW*2,H*0.885);X.lineTo(wx-wW*0.5,H*0.885);X.closePath();
  X.fill();
  X.restore();
}

function drawStoryOverlay(){
  // Intro darkness
  if(storyPhase==='intro'){
    const fadeOut=Math.max(0,1-(introTimer-INTRO_HOLD)/(INTRO_FADE));
    if(introTimer<INTRO_HOLD+INTRO_FADE){
      X.save();X.fillStyle=`rgba(0,0,0,${fadeOut})`;X.fillRect(0,0,W,H);X.restore();
    }
    // Story lines during intro
    for(const l of storyLines){
      if(introTimer>=l.startFrame&&introTimer<l.endFrame){
        const fadeIn=Math.min(1,(introTimer-l.startFrame)/25);
        const fadeO=Math.max(0,1-(introTimer-(l.endFrame-30))/30);
        l.alpha=Math.min(fadeIn,fadeO);
      } else { l.alpha=0; }
      if(l.alpha>0.01){
        X.save();X.globalAlpha=l.alpha;
        X.font='italic 18px Georgia,"Times New Roman",serif';
        X.textAlign='center';X.fillStyle='rgba(190,175,148,1)';
        X.fillText(l.text,W/2,H/2);
        X.restore();
      }
    }
    return;
  }

  // Post-shatter darkness
  if(storyPhase==='shattered'){
    const holdAlpha=Math.min(1,shatterTimer/15);
    const endFade=Math.max(0,1-(shatterTimer-SHATTER_DARK)/40);
    const a=shatterTimer<SHATTER_DARK?holdAlpha:endFade;
    X.save();X.fillStyle=`rgba(0,0,0,${a*0.94})`;X.fillRect(0,0,W,H);
    // "." then ".." then "..." then fade
    if(shatterTimer>30&&shatterTimer<SHATTER_DARK-20){
      const dots=shatterTimer<80?'.':shatterTimer<130?'..':'...';
      X.globalAlpha=Math.min(1,(shatterTimer-30)/20)*Math.min(1,(SHATTER_DARK-20-shatterTimer)/20);
      X.font='italic 22px Georgia,"Times New Roman",serif';
      X.textAlign='center';X.fillStyle='rgba(170,155,125,1)';
      X.fillText(dots,W/2,H/2);
    }
    X.restore();
    return;
  }

  // Replacing — new bulb descending
  if(storyPhase==='replacing'){
    const progress=Math.min(1,replacingProgress);
    // Draw a ghost bulb travelling down the wire
    const targetY=8+wireLen;
    const startY=-80;
    const curY=startY+(targetY-startY)*progress;
    X.save();X.globalAlpha=progress;
    // Wire from ceiling to descending bulb
    X.strokeStyle='#28253c';X.lineWidth=2;
    X.beginPath();X.moveTo(pendAnchorX,10);X.lineTo(pendAnchorX,curY);X.stroke();
    // Simple bulb silhouette
    X.fillStyle='rgba(48,44,64,0.9)';
    X.beginPath();X.arc(pendAnchorX,curY+38,26,0,Math.PI*2);X.fill();
    X.restore();
  }
}

function drawProps(){
  if(!sideTable||!chair)return;
  const{tx,topY,tW}=sideTable;
  const{cx,seatY,sW,backH,lW}=chair;
  const litFade=brightness*0.85+0.15;

  // ── Book on side table ──
  const bkX=tx-tW*0.25, bkY=topY-14, bkW=tW*0.55, bkH=10;
  // Cover
  X.fillStyle=`rgba(62,28,18,${litFade})`;
  X.fillRect(bkX,bkY,bkW,bkH);
  // Pages edge (right side)
  X.fillStyle=`rgba(210,195,165,${litFade*0.85})`;
  X.fillRect(bkX+bkW-3,bkY+1,3,bkH-2);
  // Spine line
  X.fillStyle=`rgba(35,14,8,${litFade})`;
  X.fillRect(bkX,bkY,3,bkH);
  // Light on cover
  if(brightness>0.05){
    X.fillStyle=`rgba(255,185,65,${brightness*0.12})`;
    X.fillRect(bkX,bkY,bkW,3);
  }
  // Shadow under book
  X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(bkX+2,bkY+bkH,bkW-2,3);

  // ── Coat draped over chair back ──
  const coatW=sW-lW*2-2;
  const coatX=cx-coatW/2;
  const coatTop=seatY-backH-2;
  // Coat body hanging over back
  X.fillStyle=`rgba(35,22,14,${litFade*0.9})`;
  X.beginPath();
  X.moveTo(coatX,coatTop);
  X.lineTo(coatX+coatW,coatTop);
  X.lineTo(coatX+coatW+8,coatTop+55);
  X.lineTo(coatX-8,coatTop+55);
  X.closePath();X.fill();
  // Lapel fold
  X.fillStyle=`rgba(48,30,18,${litFade*0.9})`;
  X.beginPath();
  X.moveTo(coatX+coatW*0.38,coatTop);
  X.lineTo(coatX+coatW*0.5,coatTop+22);
  X.lineTo(coatX+coatW*0.62,coatTop);
  X.closePath();X.fill();
  // Collar
  X.fillStyle=`rgba(55,35,20,${litFade})`;
  X.fillRect(coatX+coatW*0.3,coatTop-4,coatW*0.4,8);
  // Coat lit edge
  if(brightness>0.05){
    X.fillStyle=`rgba(255,180,60,${brightness*0.09})`;
    X.fillRect(coatX,coatTop,coatW,3);
  }
}

function drawHints(){
  if(hintAlpha<=0)return;
  X.save();X.globalAlpha=hintAlpha;
  X.font='italic 13px Georgia,"Times New Roman",serif';
  X.textAlign='center';X.fillStyle='rgba(178,140,82,0.55)';
  const ty=Math.min(nodes[nodes.length-1].y+58,H-90);
  X.fillText('pull cord to toggle',ropeAnchorX,ty);
  X.fillText('grab & swing the bulb',pendAnchorX,Math.min(bulb.y+140,H-60));
  X.fillText('(swing too hard and it breaks)',pendAnchorX,Math.min(bulb.y+160,H-40));
  X.restore();
}

// ── INIT & LOOP ──────────────────────────────────────────────────
function init(){
  W=C.width=window.innerWidth;H=C.height=window.innerHeight;
  initRope();initBulb();initObjects();initDust();initMoths();
}

function loop(){
  requestAnimationFrame(loop);
  frame++;
  flickerT+=1/60;

  // ── Story phase transitions ──
  if(storyPhase==='intro'){
    introTimer++;
    if(introTimer>=INTRO_HOLD+INTRO_FADE+20){
      storyPhase='idle';
    }
    // Block interaction during hard intro darkness
    if(introTimer<INTRO_HOLD) {
      drawRoom(); drawMoonlight(); drawLightAmbient();
      drawCeiling(); drawStoryOverlay();
      return;
    }
  }

  if(storyPhase==='shattered'){
    shatterTimer++;
    if(shatterTimer>=SHATTER_DARK){
      storyPhase='replacing';
      replacingProgress=0;
      initBulb();
      bulbShattered=false; shards=[];
    }
  }

  if(storyPhase==='replacing'){
    replacingProgress+=0.012;
    if(replacingProgress>=1){
      storyPhase='playing';
    }
  }

  if((storyPhase==='idle'||storyPhase==='playing')&&interacted){
    storyPhase='playing';
  }

  brightness+=((lightOn?1:0)-brightness)*0.055;
  if(startFlicker>0)startFlicker--;
  if(interacted&&hintAlpha>0)hintAlpha=Math.max(0,hintAlpha-0.018);

  stepRope(); stepBulb(); stepDust(); stepMoths(); stepShards(); stepPlot();

  if(dragTarget==='rope'&&frame-lastSwishFrame>18){
    const t=nodes[nodes.length-1];
    const spd=Math.hypot(t.x-t.px,t.y-t.py)*60;
    if(spd>2.5){soundRopeSwish(spd);lastSwishFrame=frame;}
  }

  drawRoom();
  drawMoonlight();
  drawLightAmbient();
  drawAllShadows();
  drawObjects();
  drawProps();
  drawDust();
  drawCeiling();
  drawRope(); drawWire();
  if(storyPhase!=='replacing') drawBulb();
  drawShards();
  drawMoths();
  drawHints();
  drawPlotLine();
  drawStoryOverlay();
}

init();loop();
window.addEventListener('resize',init);
</script>
